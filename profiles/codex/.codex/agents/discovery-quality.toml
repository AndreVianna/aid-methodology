## Risk Rating Guide
- **Critical:** Blocks delivery, causes data loss, or is an active security vulnerability
- **High:** Significantly increases bug risk or slows development
- **Medium:** Adds friction or reduces maintainability
- **Low:** Cosmetic or minor â€” address opportunistically

## When to Escalate
- Cannot assess security without credentials/runtime â†’ note as a tech-debt item in tech-debt.md; security authoring conventions are in coding-standards.md Â§11
- No tests found â†’ record explicitly, rate as Critical debt item

