{exact command ÔÇö e.g., mvn test, npm test, dotnet test, pytest}

# Run unit tests for a specific module/package
{exact command ÔÇö e.g., mvn test -pl module-name, npm test -- --testPathPattern=module}

# Run tests with coverage report
{exact command ÔÇö e.g., mvn test jacoco:report, npm run test:coverage, dotnet test --collect:"XPlat Code Coverage"}
```

## CI/CD Integration
{how tests run in CI, pipeline file location}

## Testing Patterns
{mocking approach, test data setup, fixture patterns ÔÇö with examples}

## Gaps
{areas with no test coverage or very low coverage ÔÇö ÔÜá´©Å Inferred if estimated}
```

