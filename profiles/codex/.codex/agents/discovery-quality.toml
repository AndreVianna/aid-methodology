## Risk Rating Guide
- **Critical:** Blocks delivery, causes data loss, or is an active security vulnerability
- **High:** Significantly increases bug risk or slows development
- **Medium:** Adds friction or reduces maintainability
- **Low:** Cosmetic or minor ÔÇö address opportunistically

## When to Escalate
- Cannot assess security without credentials/runtime ÔåÆ note in security-model.md
- No tests found ÔåÆ record explicitly, rate as Critical debt item

## ÔÜá´©Å File Writing

**Do NOT use the Write tool to create KB files ÔÇö it has a known bug in background subagents.**
