# .aid/settings.yml - AID pipeline configuration (user-owned project settings).
# Read by AID skills at invocation. Managed by /aid-config; manual edits allowed.
# The AID version + installed tools are recorded in the manifest
# (.aid/.aid-manifest.json), not here.

name: <project-name>               # set during /aid-config INIT
description: <project-description>  # sole source of truth (not in CLAUDE.md/AGENTS.md)
type: brownfield                   # brownfield | greenfield

# Global quality bar: every skill with a REVIEW state exits only when its grade
# is >= minimum_grade. Per-skill overrides at the bottom of this file.
minimum_grade: A

execution:
  max_parallel_tasks: 5   # parallel dispatch pool capacity

traceability:
  heartbeat_interval: 1   # minutes between long-running sub-agent heartbeat updates

# kb_baseline: git baseline the KB reflects. Written by aid-discover / aid-housekeep;
# absent until the first KB generation.
# kb_baseline:
#   branch: master
#   tip_date: 2026-06-12T14:03:00Z   # ISO-8601 tip commit date at generation time

discovery:
  # doc_set and term_exclusions are runtime-written by aid-discover, not seeded here.
  closure:
    max_clean_passes: 2   # consecutive zero-ungrounded DETECT passes required to close
    max_rounds: 4         # hard ceiling on EXPLAIN->DETECT->INVESTIGATE rounds
    token_budget: 0       # 0 = use pass/round caps; >0 = stop past this cumulative loop budget

# triage: thresholds the 3-path classifier PROPOSES from (human confirms).
# RM1 = source files, RM2 = source LOC, RM3 = dir count, RM4 = candidate-concept count.
triage:
  greenfield_max_source_files: 5     # RM1 <= this (with RM2 <= loc) => greenfield
  greenfield_max_source_loc:   500   # RM2 ceiling for greenfield
  large_min_source_loc:        20000 # RM2 >= this => brownfield-large
  large_min_dirs:              25    # RM3 >= this => brownfield-large
  large_min_concepts:          40    # RM4 >= this => brownfield-large

# Optional per-skill overrides of the global minimum_grade (uncomment + set).
# Keys: discover, describe, define, specify, plan, detail, execute, deploy, monitor, summary, housekeep.
# Valid grades: A+ .. F (E+/E/E- rarely useful as a floor; most projects pick A..D).
# execute:
#   minimum_grade: A+
