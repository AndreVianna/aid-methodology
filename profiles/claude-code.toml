# Profile: Claude Code (Anthropic Claude Code)
# Encodes the Claude Code host tool's install conventions.
# Consumed by render.py to emit the profiles/claude-code/.claude/ tree.

root_dir     = ".claude"
root_file    = "CLAUDE.md"
agent_format = "markdown"

[tool_names]
# Identity map: abstract tool names pass through unchanged for Claude Code.

[model_tiers]
large  = "opus"
medium = "sonnet"
small  = "haiku"

[capabilities]
hooks                  = true
skill_chaining         = true
background_execution   = true
stop_hook_autocontinue = true
