# Profile: Google Antigravity (Windsurf lineage; VS Code-fork)
# Encodes the Antigravity host tool's install conventions.
# Consumed by render.py to emit the profiles/antigravity/.agent/ tree.

root_dir     = ".agent"
root_file    = "AGENTS.md"
agent_format = "markdown"

[tool_names]
# Identity map: no published Antigravity tool-token rename.

[model_tiers.large]
model            = "gemini-3-pro"
reasoning_effort = "high"

[model_tiers.medium]
model            = "gemini-3-pro"
reasoning_effort = "low"

[model_tiers.small]
model            = "gemini-3-flash"
reasoning_effort = "low"

[capabilities]
hooks                  = true
skill_chaining         = true
background_execution   = true
stop_hook_autocontinue = false
