# Profile: Google Antigravity (Windsurf lineage; VS Code-fork like Cursor)
# Encodes the Antigravity host tool's install conventions (REQUIREMENTS §2; FR1 mapping
# provider-mapping.md — Antigravity column). Modeled on profiles/cursor.toml.

[layout]
output_root          = "profiles/antigravity/.agent"   # install_root() basename = ".agent" (§B.7: .agent singular; plural .agents/ is a tutorial variation)
agents_dir           = "rules"                          # sub-agents reshaped → .agent/rules/*.md (Q-D; engine increment). Shares rules_dir — disjoint stems (persona vs aid- prefix), no collision.
skills_dir           = "skills"                          # skills → .agent/skills/<slug>/ folders (native Skills primitive, Q-D/§B.4; existing render_skills pass, [data])
templates_dir        = "templates"                       # bare leaf → builder nests to .agent/aid/templates/ (SD-1: aid/ in builder, not in key)
# scripts_dir intentionally unset → schema default "scripts" → .agent/aid/scripts/ (SD-1 nest; bare leaf in key, aid/ in builder)
recipes_dir          = "recipes"                          # bare leaf → builder nests to .agent/aid/recipes/ (SD-1; render_recipes runs unconditionally)
project_context_file = "AGENTS.md"                       # AGENTS.md (Q-H, single cross-tool pick). NB: a filename-substitution token only; the AGENTS.md doc itself is a profile-local committed file, NOT emitted — see Context-file convention (Q-J).

[agent]
# Antigravity sub-agents reshape into .agent/rules/*.md with trigger:-style frontmatter (Q-D).
# New agent-format value reusing feature-002's E1 new-agent-format-branch mechanism (NOT E1's
# copilot-agent output, NOT the deleted E2). Requires _KNOWN_AGENT_FORMATS widening (task-012).
format = "antigravity-rule"

[agent.frontmatter]
# Antigravity rule frontmatter is trigger:/description/globs (§B.1) — NOT name/description/tools/model.
# The reshape is performed by the antigravity-rule format branch (engine, task-012); these lists are
# parsed-but-dead-for-emission (provider-mapping.md "agent-frontmatter rule") and do NOT drive the
# reshape. Values kept structurally valid and documentary only.
required = ["trigger", "description"]
optional = ["globs"]

[skill]
# Skills are native .agent/skills/ folders via the existing render_skills pass (Q-D/§B.4). [data].
decomposition = "references"
# No emit_as knob — skills are native .agent/skills/<slug>/SKILL.md folders.

[skill.frontmatter]
# Antigravity/AID-native SKILL.md required pair is name+description (Q-D/§B.4); optional extras below.
# These lists are dead-for-emission for skills (render_skills preserves canonical frontmatter verbatim)
# but kept consistent with the stated native shape.
required = ["name", "description"]
optional = ["allowed-tools", "argument-hint"]

[model_tiers.large]
# Detailed form (Q-E); Gemini-3 lineage. Exact id/effort tokenization is docs-only-noted (Q-E):
# docs expose display names ("Gemini 3 Pro (high)") rather than model-id token pairs; confirm
# gemini-3-pro + reasoning_effort="high" vs a fused id before pinning literals.
model            = "gemini-3-pro"
reasoning_effort = "high"

[model_tiers.medium]
model            = "gemini-3-pro"
reasoning_effort = "low"

[model_tiers.small]
# gemini-3-flash has no documented effort variant; "low" is a non-empty placeholder so
# ModelTierDetailed.reasoning_effort passes the validator (aid_profile.py:426-434). Confirm with Q-E tokenization.
model            = "gemini-3-flash"
reasoning_effort = "low"

[tool_names]
# Q-F: empty map — identity passthrough (no published Antigravity tool-token map; docs-only-noted).

[filename_map]
# 3 keys required by validator (aid_profile.py _CANONICAL_FILENAME_MAP_KEYS).
project_context_file = "AGENTS.md"    # Q-H
reviewer_output_file = "STATE.md"
open_questions_file  = "additional-info.md"

# No [mcp] table — MCP is [omit] for all profiles: AID ships no MCP servers
# (zero `mcp` matches in canonical/ + profiles/*.toml; FR1 Q-B).

[capabilities]
# Q-G: all 4 flags sourced from provider-mapping.md Q-G / FR1 crosswalk row 8.
hooks                  = true    # Hooks defined as JSON; intercept before-tool-call / after-file-edit / on-session-start
skill_chaining         = true    # Workflows can call other workflows; Skills invocable by the agent
background_execution   = true    # CLI / Agent Manager dispatch async background subagents
stop_hook_autocontinue = false   # No documented stop-hook auto-continue loop (GAP→lean false; matches cursor)
