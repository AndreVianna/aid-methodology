<!DOCTYPE html>
<html lang="{{LANG}}" data-theme="light">
<head>
<meta charset="UTF-8">
<!-- Resolve the theme synchronously, before first paint, to avoid a light->dark flash (FOUC).
     Shared key 'aid-dashboard-theme' (theme is one property across the whole dashboard, not per page);
     mirrors lightbox.js resolution: saved, else prefers-color-scheme, else light. -->
<script>(function(){try{var t=localStorage.getItem('aid-dashboard-theme');if(t!=='dark'&&t!=='light'){t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<meta name="description" content="{{PROJECT_NAME}} — Knowledge Base summary, generated by /aid-summarize from .aid/knowledge/">
<meta name="generator" content="aid-summarize (Claude Code skill)">
<meta name="robots" content="noindex">
<title>{{PROJECT_NAME}} — Knowledge Base Summary</title>
<style>
{{INLINE_CSS}}
</style>
</head>
<body>

<!-- Skip-to-content for keyboard / screen reader users -->
<a class="skip-link" href="#top">Skip to content</a>

<!-- Sticky top bar: brand + breadcrumb + theme toggle.
     Structure mirrors home.html and index.html (shared dashboard shell).
     breadcrumb is a static <nav> landmark (kb.html is a generated static page,
     not JS-driven); design tokens and class names are identical across all pages. -->
<header class="top-bar" role="banner">
	<span class="app-title">AID Dashboard <span class="beta-pill">beta</span></span>
	<nav class="breadcrumb" aria-label="Breadcrumb">
		<a href="/">Home</a>
		<span class="sep" aria-hidden="true">›</span>
		<a href="./home.html">{{PROJECT_NAME}}</a>
		<span class="sep" aria-hidden="true">›</span>
		<span class="current">Knowledge Base</span>
	</nav>
	<div class="controls">
		<button type="button" class="btn-ghost" id="theme-toggle"
		        aria-label="Switch theme"
		        title="Toggle light/dark theme">
			<span id="theme-icon" aria-hidden="true">&#9680;</span>
			<span id="theme-label">Dark</span>
		</button>
		<button type="button" class="btn-ghost" id="btn-export-md"
		        aria-label="Export knowledge base as Markdown"
		        title="Download knowledge base as Markdown (.md)">
			<span aria-hidden="true">&#8595;</span>
			Export as Markdown
		</button>
		<button type="button" class="btn-ghost" id="btn-export-pdf"
		        aria-label="Export knowledge base as PDF"
		        title="Print / save as PDF">
			<span aria-hidden="true">&#128424;</span>
			Export as PDF
		</button>
	</div>
</header>

<!-- Main page content -->
<main id="top">

	<!-- Hero, TOC, and section content are inserted by the generator -->
	{{BODY_CONTENT}}

</main>

<!-- Lightbox overlay (always present in DOM, toggled via .open class) -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-hidden="true"
     aria-labelledby="lb-caption" aria-describedby="lb-hint">
	<div class="lb-toolbar" role="toolbar" aria-label="Diagram zoom controls">
		<button type="button" id="lb-zoom-out" aria-label="Zoom out" title="Zoom out (−)">−</button>
		<button type="button" id="lb-zoom-reset" aria-label="Reset zoom" title="Reset zoom (0)">⟲</button>
		<button type="button" id="lb-zoom-in" aria-label="Zoom in" title="Zoom in (+)">+</button>
		<button type="button" id="lb-close" aria-label="Close (Esc)" title="Close (Esc)">✕</button>
	</div>
	<div class="lb-hint" id="lb-hint">Scroll to zoom · Drag to pan · Esc to close</div>
	<div class="lb-stage" id="lb-stage">
		<div class="lb-inner" id="lb-inner"></div>
	</div>
	<div class="lb-caption" id="lb-caption" aria-live="polite"></div>
</div>

<footer id="page-footer">
	<p>Generated from <code>.aid/knowledge/</code> on {{GENERATION_DATE}} &middot;
	   Re-run <code>/aid-summarize</code> to update &middot;
	   Styled with system fonts and CSS variables &mdash; no external assets.</p>
</footer>

<!-- Fallback for users with JavaScript disabled -->
<noscript>
	<div class="noscript-fallback">
		<h2>JavaScript required</h2>
		<p>This summary uses JavaScript to power the theme toggle, lightbox, and
		   scrollspy. With JavaScript disabled, the interactive features will not work.</p>
		<p>Either enable JavaScript, or read the source markdown files directly in
		   <code>.aid/knowledge/</code>:</p>
		<ul>
			<li><a href="./INDEX.md">INDEX.md</a> — Knowledge Base map</li>
			{{NOSCRIPT_DOC_LIST}}
		</ul>
	</div>
</noscript>

<script>
{{INLINE_LIGHTBOX_JS}}
</script>

</body>
</html>
