# Profile: GitHub Copilot CLI
# Encodes the Copilot CLI host tool's install conventions.
# Consumed by render.py to emit the profiles/copilot-cli/.github/ tree.

root_dir     = ".github"
root_file    = "AGENTS.md"
agent_format = "markdown"

[tool_names]
# Copilot CLI uses "shell" instead of "Bash".
Bash = "shell"

[model_tiers]
large  = "claude-opus-4.8"
medium = "claude-sonnet-4.6"
small  = "claude-haiku-4.5"

[capabilities]
hooks                  = true
skill_chaining         = true
background_execution   = true
stop_hook_autocontinue = true
