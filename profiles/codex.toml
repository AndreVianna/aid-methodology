# Profile: Codex CLI (OpenAI Codex CLI)
# Encodes the Codex CLI host tool's install conventions.
# Consumed by render.py to emit the profiles/codex/.codex/ tree.
#
# agent_format: "toml" retained DORMANT (E-CODEX-1 not yet high-confidence).
# Expected final state: "markdown" once E-CODEX-1 is confirmed.

root_dir     = ".codex"
root_file    = "AGENTS.md"
agent_format = "toml"

[tool_names]
# Identity map: Codex uses the same tool names as Claude Code.

[model_tiers.large]
model            = "gpt-5.5"
reasoning_effort = "high"

[model_tiers.medium]
model            = "gpt-5.4"
reasoning_effort = "medium"

[model_tiers.small]
model            = "gpt-5.4-mini"
reasoning_effort = "low"

[capabilities]
hooks                  = false
skill_chaining         = true
background_execution   = false
stop_hook_autocontinue = false
