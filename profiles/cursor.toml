# Profile: Cursor (Cursor IDE)
# Encodes the Cursor IDE host tool's install conventions.
# Consumed by render.py to emit the profiles/cursor/.cursor/ tree.

root_dir     = ".cursor"
root_file    = "AGENTS.md"
agent_format = "markdown"

[tool_names]
# Cursor uses "Terminal" instead of "Bash" for shell execution.
Bash = "Terminal"

[model_tiers]
large  = "opus"
medium = "sonnet"
small  = "haiku"

[capabilities]
hooks                  = true
skill_chaining         = true
background_execution   = false
stop_hook_autocontinue = false
