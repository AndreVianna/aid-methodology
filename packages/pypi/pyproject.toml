[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aid-installer"
version = "2.0.6"
description = "AID (AI Integrated Development) CLI installer - puts the persistent aid command on PATH via pipx or pip"
readme = "README.md"
requires-python = ">=3.8"
dependencies = []
keywords = ["aid", "AI", "integrated", "development", "cli", "installer"]
license = "MIT"
license-files = ["LICENSE"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Build Tools",
]

[[project.authors]]
name = "Andre Vianna"
email = "andre.vianna.rj@hotmail.com"

[project.urls]
Homepage = "https://aid.casuloailabs.com"
Documentation = "https://aid.casuloailabs.com"
Repository = "https://github.com/AndreVianna/aid-methodology"
Issues = "https://github.com/AndreVianna/aid-methodology/issues"

[project.scripts]
aid = "aid_installer.__main__:main"

[tool.hatch.build.targets.wheel]
include = [
    "/aid_installer",
]
artifacts = [
    "aid_installer/_vendor/**",
]

[tool.hatch.build.targets.sdist]
# Force-include the vendored CLI payload so the sdist is SELF-CONTAINED. `python -m build`
# builds the wheel from the sdist in an isolated temp dir without the repo-root bin/lib/VERSION,
# so the payload must travel inside the sdist (the build hook below then skips re-vendoring).
artifacts = [
    "aid_installer/_vendor/**",
]

[tool.hatch.build.hooks.custom]
path = "scripts/vendor.py"
