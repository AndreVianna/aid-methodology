# canonical/aid/templates/shortcut-catalog.yml
#
# Single-source manifest for the direct-entry shortcut engine (feature-003,
# work-001-lite-aid-skills). One row per invocation name -- both a canonical
# verb+artifact form and its thin alias forms (aid-add-* mirrors aid-create-*;
# aid-update-* mirrors aid-change-*) are separate rows/directories; the generator
# provides no runtime alias/redirect mechanism (research/spec-grounding.md § Q-A2).
#
# Renders as VERBATIM BYTES to `<root>/aid/templates/shortcut-catalog.yml` in all 5
# profiles -- a `.yml` is not in render.py's `_TEXT_EXTENSIONS`, matching the shipped
# `templates/settings.yml` precedent (render.py grep `_TEXT_EXTENSIONS`).
#
# Two consumers:
#   1. The maintainer build helper
#      (`.claude/skills/generate-profile/scripts/build-shortcut-skills.py`) -- reads this
#      file and emits/refreshes the thin-doorway `canonical/skills/aid-<name>/SKILL.md`
#      directories, one per non-`repurpose` row. After any edit to this file the
#      maintainer runs that helper, then the FULL `run_generator.py` (never a partial
#      render -- architecture.md § Gotchas).
#   2. `/aid-triage` (feature-014) at runtime -- resolves a typed invocation to its
#      `{verb, artifact, default_type, group}` binding for an unsure user.
#
# ---------------------------------------------------------------------------
# Field contract (every row; documented once here, not repeated per row)
# ---------------------------------------------------------------------------
#
#   name          (required, string) -- the invocation name AND the skill directory name
#                 AND the rendered `/command` name. `render.py` sets
#                 `skill_slug = skill_dir.name` and carries the frontmatter `name:`
#                 through untouched -- there is no command-alias mechanism, so every
#                 name a user can type is its own `canonical/skills/<name>/SKILL.md`
#                 directory. MUST be `aid-` prefixed and MUST equal the directory it
#                 lives in.
#
#   verb          (required, string) -- the verb the engine dispatches on (e.g. `create`,
#                 `fix`, `experiment`). An alias row carries the SAME verb as its
#                 canonical mirror (`aid-add-api` -> `verb: create`, matching
#                 `aid-create-api`) -- aliases are separate directories with an
#                 identical `{verb, artifact}` binding, not a runtime redirect.
#
#   artifact      (required, string, may be `""`) -- the artifact-type suffix (e.g.
#                 `api`, `ui`, `data-model`). `""` for bare verbs that take no artifact
#                 suffix (`aid-fix`, `aid-refactor`, `aid-experiment`, `aid-report`, ...).
#
#   alias_of      (required, string or `null`) -- `null` for a canonical row; the
#                 mirrored CANONICAL `name` for an alias row (`aid-add-api` ->
#                 `alias_of: aid-create-api`; `aid-update-api` ->
#                 `alias_of: aid-change-api`). An alias is a full, separate
#                 `canonical/skills/<name>/SKILL.md` directory -- see the Topology note
#                 above; this field is bookkeeping for the parity check and
#                 `/aid-triage`, not a redirect the generator resolves.
#
#   default_type  (required, string) -- the default task Type this shortcut's DETAIL
#                 emits, one of the closed 8-enum (byte-stable; extending it is a
#                 lockstep break across `grade.sh`, both dashboard reader twins, and
#                 every grading skill -- `artifact-schemas.md § Contracts`):
#                   RESEARCH | DESIGN | IMPLEMENT | TEST | DOCUMENT | MIGRATE | REFACTOR | CONFIGURE
#                 Multi-task shortcuts (e.g. create-data-model -> MIGRATE + IMPLEMENT +
#                 TEST) still declare exactly ONE `default_type` here -- the row's
#                 PRIMARY/first task type. The full per-family task breakdown lives in
#                 the family's scaffolding reference
#                 (`shortcut-scaffolding/<family>.md`), not in this field. See the
#                 default-type mapping table in `shortcut-engine.md` (A-6; no enum
#                 change) for the verb -> default_type rationale.
#
#   group         (required, string) -- the activity group this shortcut belongs to,
#                 per REQUIREMENTS.md §5.1 (e.g. `G4` for the Create family, `G6` for
#                 Fix). Organizational metadata; NOT a task Type.
#
#   intent        (required, string) -- a one-line human-readable summary of what this
#                 shortcut does. For an alias row this is simply
#                 `"Alias of <canonical-name>."`.
#
#   repurpose     (optional, boolean, default `false`) -- `true` ONLY for the 4
#                 hand-authored skills this catalog also registers so the parity
#                 check and `/aid-triage` recognise them: the 2 pre-existing FAT
#                 pipeline skills `aid-deploy` / `aid-monitor` (feature-012
#                 re-purposes them; G9/G10), plus the 2 Q&A skills `aid-query-kb`
#                 (pre-existing) / `aid-ask` (v2.1.0 coverage-gap follow-on;
#                 restored here as `aid-query-kb`'s friendly-named thin alias, NOT
#                 pre-existing -- G11; see those rows' own comment block). The
#                 maintainer build helper (`build-shortcut-skills.py`) SKIPS
#                 `repurpose: true` rows -- it never generates or overwrites their
#                 `SKILL.md` (they are hand-authored, not thin doorways).
#
# ---------------------------------------------------------------------------
# Row shape (documentation only -- illustrative; NOT a live row. Family features
# 005-013 append their own real rows to the `shortcuts:` list below; the first
# family row lands via a later task, not this one).
# ---------------------------------------------------------------------------
#
#   - name: aid-create-api      # == skill directory == /command (render.py: name == dir)
#     verb: create               # the verb the engine dispatches on
#     artifact: api               # artifact suffix ("" for bare verbs: fix, refactor, ...)
#     alias_of: null              # null = canonical form
#     default_type: IMPLEMENT     # default task Type (closed 8-enum; see shortcut-engine.md § A-6)
#     group: G4                   # activity group (REQUIREMENTS.md §5.1)
#     intent: "Create an API endpoint / middleware (contract, handler, validation)."
#   - name: aid-add-api
#     verb: create                 # add == create (alias family)
#     artifact: api
#     alias_of: aid-create-api     # thin alias; identical engine binding
#     default_type: IMPLEMENT
#     group: G4
#     intent: "Alias of aid-create-api."
#     # repurpose: false           # illustrative -- normally omitted (default false)
#
# ---------------------------------------------------------------------------

