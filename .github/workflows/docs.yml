name: Docs

# Builds the Astro Starlight site under site/ and deploys it to GitHub Pages
# at https://aid.casuloailabs.com.  Decoupled from release.yml: it does not
# modify or depend on the release pipeline.  Pages deploys only from master
# (push or manual re-deploy) — the github-pages environment permits master-ref
# deploys only, so a tag/release ref is rejected.  After a release, refresh the
# release-bound content with a workflow_dispatch on master.

on:
  push:
    branches: [master]
    paths:                      # only rebuild when site inputs change
      - 'site/**'
      - 'docs/**'               # migrated content source (feature-005)
      - 'VERSION'               # version injection input (feature-008)
      - '.github/workflows/docs.yml'
  pull_request:                 # M2: gate PRs to master — build-validate site inputs before merge
    branches: [master]          # (the `deploy` job is skipped on PRs; build only)
    paths:
      - 'site/**'
      - 'docs/**'
      - 'VERSION'
      - '.github/workflows/docs.yml'
  workflow_dispatch:            # manual re-deploy (also refreshes release-bound content after a release)

# Least-privilege: read the repo, write the Pages deployment, mint the OIDC
# token deploy-pages exchanges.  No contents:write, no issues/pull-requests.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; a newer push supersedes an older
# queued run, but never cancel a deploy mid-publish.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    name: build (astro build → Pages artifact)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'site/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'site/package-lock.json'

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      # Build-time data-fetch (feature-002 OWNS this; features 008/009 consume it).
      # Reads VERSION + the GitHub Releases API via the workflow GITHUB_TOKEN
      # and exports the contract env vars into $GITHUB_ENV for the build step.
      # Degrades gracefully: exits 0 on any API failure; build never blocked.
      - name: Fetch build-time release data (VERSION + Releases API)
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node site/scripts/fetch-release-data.mjs >> "$GITHUB_ENV"

      - name: Install deps (reproducible)
        working-directory: site
        run: npm ci

      - name: Build Astro Starlight site
        working-directory: site
        env:
          # Surface the build-time data-fetch contract to the Astro SSG build
          AID_VERSION: ${{ env.AID_VERSION }}
          AID_LATEST_RELEASE_JSON: ${{ env.AID_LATEST_RELEASE_JSON }}
          AID_RELEASES_JSON: ${{ env.AID_RELEASES_JSON }}
        run: npm run build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist

  deploy:
    name: deploy (Pages)
    needs: build
    # M2: build-validate on PRs, but only ever DEPLOY on a real push to master / a release.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
